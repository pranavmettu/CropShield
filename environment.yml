name: cropshield
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  # Core
  - pandas>=2.0.0
  - numpy>=1.24.0
  - requests>=2.31.0
  - pyyaml>=6.0
  - python-dotenv>=1.0.0
  # ML
  - scikit-learn>=1.3.0
  - xgboost>=2.0.0
  - lightgbm>=4.0.0
  # Geospatial
  - geopandas>=0.14.0
  - shapely>=2.0.0
  # Visualization
  - matplotlib>=3.7.0
  - plotly>=5.15.0
  - seaborn>=0.12.0
  # Dashboard
  - streamlit>=1.28.0
  # Persistence
  - joblib>=1.3.0
  # Testing
  - pytest>=7.4.0
  - pytest-cov>=4.1.0
  # Notebooks
  - jupyter
  - ipykernel
  - pip:
    # Any pip-only packages go here
    - shap>=0.43.0
